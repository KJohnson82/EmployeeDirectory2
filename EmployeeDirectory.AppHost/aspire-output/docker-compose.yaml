services:
  ed-env:
    image: "mcr.microsoft.com/dotnet/nightly/aspire-dashboard:latest"
    environment:
      ASPIRE_DASHBOARD_FORWARDEDHEADERS_ENABLED: "true"
      ASPIRE_
    ports:
      - "7070:18888"
    expose:
      - "18889"
      - "18890"
    networks:
      - "aspire"
    restart: "always"
  ed-postgres:
    image: "docker.io/library/postgres:17.6"
    environment:
      POSTGRES_HOST_AUTH_METHOD: "scram-sha-256"
      POSTGRES_INITDB_ARGS: "--auth-host=scram-sha-256 --auth-local=scram-sha-256"
      POSTGRES_USER: "postgres"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}"
    expose:
      - "5432"
    volumes:
      - type: "volume"
        target: "/var/lib/postgresql/data"
        source: "employeedirectory-pgdata"
        read_only: false
    networks:
      - "aspire"
  ed-redis:
    image: "docker.io/library/redis:8.6"
    command:
      - "-c"
      - "redis-server --requirepass $$REDIS_PASSWORD --save 60 1"
    entrypoint:
      - "/bin/sh"
    environment:
      REDIS_PASSWORD: "${ED_REDIS_PASSWORD}"
    expose:
      - "6379"
    volumes:
      - type: "volume"
        target: "/data"
        source: "employeedirectory-redis-data"
        read_only: false
    networks:
      - "aspire"
  ed-api:
    image: "${ED_API_IMAGE}"
    environment:
      OTEL_DOTNET_EXPERIMENTAL_OTLP_RETRY: "in_memory"
      ASPNETCORE_FORWARDEDHEADERS_ENABLED: "true"
      HTTP_PORTS: "${ED_API_PORT}"
      ConnectionStrings__employeedirectory-db: "Host=ed-postgres;Port=5432;Username=postgres;Password=${POSTGRES_PASSWORD};Database=employeedirectory-db"
      EMPLOYEEDIRECTORY_DB_HOST: "ed-postgres"
      EMPLOYEEDIRECTORY_DB_PORT: "5432"
      EMPLOYEEDIRECTORY_DB_USERNAME: "postgres"
      EMPLOYEEDIRECTORY_DB_PASSWORD: "${POSTGRES_PASSWORD}"
      EMPLOYEEDIRECTORY_DB_URI: "postgresql://postgres:${POSTGRES_PASSWORD}@ed-postgres:5432/employeedirectory-db"
      EMPLOYEEDIRECTORY_DB_JDBCCONNECTIONSTRING: "jdbc:postgresql://ed-postgres:5432/employeedirectory-db"
      EMPLOYEEDIRECTORY_DB_DATABASENAME: "employeedirectory-db"
      ConnectionStrings__ed-redis: "ed-redis:6379,password=${ED_REDIS_PASSWORD}"
      ED_REDIS_HOST: "ed-redis"
      ED_REDIS_PORT: "6379"
      ED_REDIS_PASSWORD: "${ED_REDIS_PASSWORD}"
      ED_REDIS_URI: "redis://:${ED_REDIS_PASSWORD}@ed-redis:6379"
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://employeedirectory-env-dashboard:18889"
      OTEL_EXPORTER_OTLP_PROTOCOL: "grpc"
      OTEL_SERVICE_NAME: "ed-api"
    ports:
      - "${ED_API_PORT}"
    depends_on:
      ed-postgres:
        condition: "service_started"
      ed-redis:
        condition: "service_started"
    networks:
      - "aspire"
  ed-admin:
    image: "${ED_ADMIN_IMAGE}"
    environment:
      OTEL_DOTNET_EXPERIMENTAL_OTLP_RETRY: "in_memory"
      ASPNETCORE_FORWARDEDHEADERS_ENABLED: "true"
      HTTP_PORTS: "${ED_ADMIN_PORT}"
      ConnectionStrings__employeedirectory-db: "Host=ed-postgres;Port=5432;Username=postgres;Password=${POSTGRES_PASSWORD};Database=employeedirectory-db"
      EMPLOYEEDIRECTORY_DB_HOST: "ed-postgres"
      EMPLOYEEDIRECTORY_DB_PORT: "5432"
      EMPLOYEEDIRECTORY_DB_USERNAME: "postgres"
      EMPLOYEEDIRECTORY_DB_PASSWORD: "${POSTGRES_PASSWORD}"
      EMPLOYEEDIRECTORY_DB_URI: "postgresql://postgres:${POSTGRES_PASSWORD}@ed-postgres:5432/employeedirectory-db"
      EMPLOYEEDIRECTORY_DB_JDBCCONNECTIONSTRING: "jdbc:postgresql://ed-postgres:5432/employeedirectory-db"
      EMPLOYEEDIRECTORY_DB_DATABASENAME: "employeedirectory-db"
      ConnectionStrings__ed-redis: "ed-redis:6379,password=${ED_REDIS_PASSWORD}"
      ED_REDIS_HOST: "ed-redis"
      ED_REDIS_PORT: "6379"
      ED_REDIS_PASSWORD: "${ED_REDIS_PASSWORD}"
      ED_REDIS_URI: "redis://:${ED_REDIS_PASSWORD}@ed-redis:6379"
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://employeedirectory-env-dashboard:18889"
      OTEL_EXPORTER_OTLP_PROTOCOL: "grpc"
      OTEL_SERVICE_NAME: "ed-admin"
    ports:
      - "${ED_ADMIN_PORT}"
    depends_on:
      ed-postgres:
        condition: "service_started"
      ed-redis:
        condition: "service_started"
    networks:
      - "aspire"
networks:
  aspire:
    driver: "bridge"
volumes:
  employeedirectory-pgdata:
    driver: "local"
  employeedirectory-redis-data:
    driver: "local"
